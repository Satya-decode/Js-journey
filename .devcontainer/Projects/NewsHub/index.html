<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>The News App</title>
    <link rel='stylesheet' href='style.css'>
</head>
<body>

    <nav>
        <div class="main-nav container flex">
            <a href="#" onclick="reload()" class="company-logo">
                <img src="./assets/samachar.jpg" alt="company logo">
            </a>
            <div class="nav-links">
                <ul class="flex">
                    <li class="hover-link nav-item" id="ipl" onClick = "onNavItemClick('ipl')">IPL</li>
                    <li class="hover-link nav-item" id="finance" onClick = "onNavItemClick('finance')">Finance</li>
                    <li class="hover-link nav-item" id="politics" onClick = "onNavItemClick('politics')">Politics</li>
                </ul>
            </div>
            <div class="search-bar flex">
                <input id="search-text" type="text" class="news-input" placeholder="e.g. Science">
                <button id="search-button" class="search-button">Search</button>
            </div>
        </div>
    </nav>

    <main>
        <div class="cards-container container flex" id="cards-container">
           
        </div>
    </main>

    <template id="tempelate-news-card">
         <div class="card">
                <div class="card-header">
                    <img src="#https://via.placeholder.com/400*200" alt="news-img" id="news-img"
                </div>

                <div class="card-contents">
                    <h3 id="news-title">This is the Title</h3>
                    <h6 id="news-source">End Gadget 26/08/2023</h6>
                    <p class="news-desc" id="news-desc">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Alias recusandae a ut mollitia velit commodi voluptates facilis repellat minus ducimus?</p>

                </div>
            </div> 
    </template>


    <script src="script.js"></script>
    
</body>
</html>
